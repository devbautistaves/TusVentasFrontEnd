<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- Meta SEO principal -->
    <title>TusVentas - Sé tu propio jefe</title>
    <meta name="description" content="Convertite en tu propio jefe vendiendo con nosotros. Ingresos por comisión, flexibilidad horaria y apoyo constante. Sumate a TusVentas y construí tu negocio hoy mismo." />
    <link rel="canonical" href="https://tusventas.digital/" />

    <!-- Autoría -->
    <meta name="author" content="Bautista Vescio" />
    <meta name="copyright" content="TusVentas Digitales" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tusventas.digital/" />
    <meta property="og:title" content="TusVentas - Sé tu propio jefe" />
    <meta property="og:description" content="Convertite en tu propio jefe vendiendo con nosotros. Ingresos por comisión, flexibilidad horaria y apoyo constante." />
    <meta property="og:image" content="https://tusventas.digital/bannertusventas.png" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:site_name" content="TusVentas Digitales" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TusVentas - Sé tu propio jefe" />
    <meta name="twitter:description" content="Convertite en tu propio jefe vendiendo con nosotros. Ingresos por comisión, flexibilidad horaria y apoyo constante." />
    <meta name="twitter:image" content="https://tusventas.digital/bannertusventas.png" />

    <!-- PWA -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Datos estructurados JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TusVentas Digitales",
      "url": "https://tusventas.digital/",
      "logo": "https://tusventas.digital/logo192.png",
      "sameAs": [
        "https://www.instagram.com/tusventas",
        "https://www.facebook.com/tusventas"
      ]
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://tusventas.digital/",
      "name": "TusVentas Digitales",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://tusventas.digital/buscar?q={query}",
        "query-input": "required name=query"
      }
    }
    </script>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
    <div id="root"></div>
  </body>
</html>
